<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DANDI Compute – AIND Pipeline Results</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />

        <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
        <link rel="icon" href="assets/favicon-32x32.png" type="image/png" sizes="32x32" />
        <link rel="icon" href="assets/favicon-16x16.png" type="image/png" sizes="16x16" />
        <link rel="apple-touch-icon" href="assets/android-chrome-192x192.png" />
    </head>
    <body>
        <header class="site-header">
            <a href="/aind-page" class="site-brand">
                <img src="assets/dandi-compute-logo.png" alt="DANDI Compute logo" class="site-logo" />
                DANDI Compute
            </a>
            <span class="site-title">Pipeline Results</span>
            <a href="?view=tests" class="site-tests-link">Tests</a>
            <div class="site-header-spacer"></div>
            <button
                id="theme_toggle_btn"
                class="theme-toggle-btn"
                aria-label="Switch to light mode"
                title="Switch to light mode"
            ></button>
            <a
                href="https://github.com/dandi-compute/001697"
                class="site-github-link"
                target="_blank"
                rel="noopener"
                aria-label="View data repository on GitHub"
            >
                <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                    -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                    .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                    -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                    .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                    .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                    0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8
                    c0-4.42-3.58-8-8-8z"
                    />
                </svg>
            </a>
        </header>

        <div class="page-content">
            <h1>AIND Ephys Pipeline Results</h1>
            <p class="page-subtitle">
                Automated electrophysiology processing runs via the
                <a href="https://github.com/dandi-compute" target="_blank" rel="noopener">DANDI Compute: AIND</a>
                pipeline. Reports provided by
                <a href="https://github.com/dandi-compute/001697" target="_blank" rel="noopener">dandi-compute/001697</a
                >.
            </p>

            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading pipeline runs…</p>
            </div>

            <div id="error" class="error-state" style="display: none"></div>
            <div id="filter-banner" class="filter-banner" style="display: none"></div>
            <div id="summary" style="display: none"></div>
            <div id="layout-bar" style="display: none"></div>
            <div id="runs" style="display: none"></div>
        </div>

        <!-- Log file modal -->
        <div id="log-modal" class="log-modal-overlay" hidden>
            <div class="log-modal-box" role="dialog" aria-modal="true" aria-labelledby="log-modal-title">
                <div class="log-modal-header">
                    <span id="log-modal-title" class="log-modal-title"></span>
                    <div class="log-modal-actions">
                        <a
                            id="log-modal-external"
                            href="#"
                            class="log-modal-btn-external"
                            target="_blank"
                            rel="noopener"
                            >↗ Open</a
                        >
                        <button id="log-modal-close" class="log-modal-btn-close" aria-label="Close">✕</button>
                    </div>
                </div>
                <div id="log-modal-body" class="log-modal-body"></div>
            </div>
        </div>

        <script src="app.js" defer></script>
    </body>
</html>
